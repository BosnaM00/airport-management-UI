<div class="dashboard-wrapper">
  <div class="dashboard-header">
    <h1>Welcome back!</h1>
    <p class="subtitle">What would you like to do today?</p>
  </div>

  <div class="dashboard-cards">
    <mat-card class="action-card" routerLink="/search-flights">
      <mat-card-content>
        <mat-icon>flight_takeoff</mat-icon>
        <h2>Search Flights</h2>
        <p>Find and book flights to your next destination.</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="action-card" routerLink="/bookings">
      <mat-card-content>
        <mat-icon>confirmation_number</mat-icon>
        <h2>My Bookings</h2>
        <p>View and manage your existing reservations.</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="action-card" routerLink="/profile">
      <mat-card-content>
        <mat-icon>person</mat-icon>
        <h2>My Profile</h2>
        <p>View your travel documents and loyalty information.</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
