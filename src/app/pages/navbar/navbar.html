<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/search-flights">Airport Manager</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <!-- Guest or Passenger links -->
        <ng-container *ngIf="!authService.isLoggedIn() || userRole === 'PASSENGER'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/search-flights" routerLinkActive="active">Search Flights</a>
          </li>
        </ng-container>

        <!-- Passenger-only links -->
        <ng-container *ngIf="userRole === 'PASSENGER'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/bookings" routerLinkActive="active">My Bookings</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="active">My Profile</a>
          </li>
        </ng-container>

        <!-- Employee-only links -->
        <ng-container *ngIf="userRole === 'EMPLOYEE'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/flights" routerLinkActive="active">Flights</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/aircraft" routerLinkActive="active">Aircraft</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/airports" routerLinkActive="active">Airports</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/bookings" routerLinkActive="active">All Bookings</a>
          </li>
        </ng-container>
      </ul>

      <div class="ms-auto">
        <ng-container *ngIf="authService.isLoggedIn(); else signInBtn">
          <button mat-stroked-button (click)="logout()">Sign out</button>
        </ng-container>
        <ng-template #signInBtn>
          <button mat-raised-button color="primary" (click)="openLogin()">Sign in</button>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
