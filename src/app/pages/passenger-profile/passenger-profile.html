<div class="profile-wrapper">
  <div class="profile-header">
    <button mat-icon-button routerLink="/passenger-dashboard" class="back-btn">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>My Profile</h1>
  </div>

  <mat-card class="profile-card">
    <mat-card-content>
      <div class="section-title">
        <mat-icon>badge</mat-icon>
        <span>Travel Documents</span>
      </div>
      <mat-divider></mat-divider>
      <div class="info-grid">
        <div class="info-item">
          <span class="label">Document Type</span>
          <span class="value">—</span>
        </div>
        <div class="info-item">
          <span class="label">Document Number</span>
          <span class="value">—</span>
        </div>
        <div class="info-item">
          <span class="label">Nationality</span>
          <span class="value">—</span>
        </div>
      </div>

      <div class="section-title" style="margin-top: 24px;">
        <mat-icon>stars</mat-icon>
        <span>Loyalty & Contact</span>
      </div>
      <mat-divider></mat-divider>
      <div class="info-grid">
        <div class="info-item">
          <span class="label">Loyalty Tier</span>
          <span class="value">—</span>
        </div>
        <div class="info-item">
          <span class="label">Emergency Contact</span>
          <span class="value">—</span>
        </div>
      </div>

      <p class="coming-soon">Full profile editing will be available soon.</p>
    </mat-card-content>
  </mat-card>
</div>
